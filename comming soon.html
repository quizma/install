<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizma! - Coming Soon</title>
    <style>
        /* Brand Color Palette */
        :root {
            --bg-blue: #0073cf;
            --shadow-pink: #e61f63;
            --text-white: #ffffff;
            --dark-blue: #00569d;
            --input-bg: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka One', 'Nunito', 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-blue);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 35px;
        }

        /* Branding Images */
        .logo-img {
            max-width: 280px;
            height: auto;
            filter: drop-shadow(8px 8px 0px var(--shadow-pink));
            animation: float 4s ease-in-out infinite;
        }

        .mascot-img {
            max-width: 180px;
            height: auto;
            filter: drop-shadow(10px 10px 0px var(--shadow-pink));
            margin-top: 10px;
        }

        /* Typography & Headings */
        .status-badge {
            background-color: var(--shadow-pink);
            color: var(--text-white);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            box-shadow: 0 4px 0px var(--dark-blue);
        }

        h1 {
            font-size: 3rem;
            line-height: 1.2;
            font-weight: 700;
            max-width: 650px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 550px;
            font-weight: 500;
            line-height: 1.5;
        }

        /* Countdown Timer Grid */
        .countdown-container {
            display: flex;
            gap: 20px;
            margin: 15px 0;
        }

        .countdown-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px;
            border-radius: 16px;
            min-width: 90px;
            box-shadow: inset 0 4px 0 rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .countdown-number {
            font-size: 2.5rem;
            font-weight: bold;
            display: block;
            font-family: 'Fredoka One', sans-serif;
        }

        .countdown-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.7;
            letter-spacing: 1px;
            margin-top: 5px;
            display: block;
        }

        /* Notification Form Styling */
        .notify-box {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.08);
            padding: 8px;
            border-radius: 50px;
            display: flex;
            border: 3px solid var(--text-white);
            box-shadow: 0 8px 0px var(--dark-blue);
        }

        .notify-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0 25px;
            font-size: 1.1rem;
            color: var(--text-white);
            outline: none;
            font-weight: 500;
        }

        .notify-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .notify-btn {
            background-color: var(--text-white);
            color: #111;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .notify-btn:hover {
            background-color: #f0f0f0;
            transform: scale(1.03);
        }

        /* Float Animation for Logo */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Adaptive Mobile Views */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .countdown-container { gap: 10px; }
            .countdown-box { min-width: 70px; padding: 10px; }
            .countdown-number { font-size: 1.8rem; }
            .notify-box {
                flex-direction: column;
                background: transparent;
                border: none;
                box-shadow: none;
                gap: 12px;
                padding: 0;
            }
            .notify-input {
                background: var(--input-bg);
                border: 3px solid var(--text-white);
                padding: 16px 25px;
                border-radius: 50px;
                text-align: center;
            }
            .notify-btn {
                width: 100%;
                padding: 16px;
                box-shadow: 0 6px 0px var(--dark-blue);
            }
        }
    </style>
    <!-- Friendly rounded Google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        
        <!-- Status Badge -->
        <div class="status-badge">Under Construction</div>

        <!-- Referencing logo.png verbatim -->
        <img src="logo.png" alt="Quizma! Logo" class="logo-img">

        <!-- Main Catchphrase -->
        <h1>Something awesome is cooking!</h1>
        <p>The ultimate multiplayer trivia platform is almost ready. Drop your email below to get an invite the second we go live!</p>

        <form action="">
            <label>Email</label>
            <input type="email">
        </form>
