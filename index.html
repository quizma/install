<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizma! - Install Now</title>
    <style>
        /* Brand Colors & Base Styles */
        :root {
            --bg-blue: #0073cf;
            --shadow-pink: #e61f63;
            --text-white: #ffffff;
            --dark-blue: #00569d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka One', 'Nunito', 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-blue);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Container Alignment */
        .container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 40px;
        }

        /* Logo Area styling with long shadow effect */
        .logo-container {
            position: relative;
            margin-bottom: 20px;
        }

        .logo-text {
            font-size: 5rem;
            font-weight: 900;
            color: var(--text-white);
            text-shadow: 
                4px 4px 0px var(--shadow-pink),
                8px 8px 0px var(--shadow-pink),
                12px 12px 0px var(--shadow-pink),
                16px 16px 0px var(--shadow-pink),
                20px 20px 0px var(--shadow-pink),
                24px 24px 0px var(--shadow-pink),
                28px 28px 0px var(--shadow-pink),
                32px 32px 0px var(--shadow-pink),
                100px 100px 150px rgba(0,0,0,0.2);
            letter-spacing: -2px;
            display: inline-block;
        }

        /* Mascot Presentation */
        .mascot-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SVG placeholder representing your cool winking question mark */
        .mascot-fallback {
            width: 100%;
            height: 100%;
            filter: drop-shadow(15px 15px 0px var(--shadow-pink));
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            max-width: 600px;
            line-height: 1.3;
            font-weight: 700;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 500px;
            margin-top: -20px;
            font-weight: 500;
        }

        /* Download Button Grid */
        .download-badge-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
        }

        .btn-download {
            background-color: var(--text-white);
            color: #111;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 0px var(--dark-blue);
            transition: all 0.1s ease;
            border: 3px solid var(--text-white);
        }

        .btn-download:hover {
            transform: translateY(2px);
            box-shadow: 0 6px 0px var(--dark-blue);
        }

        .btn-download:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0px var(--dark-blue);
        }

        .btn-download svg {
            width: 28px;
            height: 28px;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .logo-text {
                font-size: 3.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .mascot-wrapper {
                width: 200px;
                height: 200px;
            }
            .download-badge-container {
                flex-direction: column;
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    </div>

</body>
</html>
